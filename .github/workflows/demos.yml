name: Demos

on:
  push:
    branches: [main]
    paths: ["demos/**"]
  pull_request:
    branches: [main]
    paths: ["demos/**"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (pulls pyyaml + jsonschema)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Validate every demo manifest + fixture
        run: loop-anything demo validate
